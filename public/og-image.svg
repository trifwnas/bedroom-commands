<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc3a40"/>
      <stop offset="50%" style="stop-color:#b82e33"/>
      <stop offset="100%" style="stop-color:#a01e28"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="85%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <path id="heart" d="M0-10 C0-14 -5-18 -9-18 C-14-18 -18-13 -18-8 C-18 0 0 14 0 14 C0 14 18 0 18-8 C18-13 14-18 9-18 C5-18 0-14 0-10Z"/>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative card shapes on the right -->
  <g transform="translate(900,300) rotate(-10)">
    <rect x="0" y="0" width="130" height="185" rx="16" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  </g>
  <g transform="translate(950,260) rotate(4)">
    <rect x="0" y="0" width="130" height="185" rx="16" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="65" y="95" font-family="system-ui,-apple-system,sans-serif" font-size="40" fill="rgba(255,255,255,0.3)" text-anchor="middle" font-weight="700">?</text>
  </g>
  <g transform="translate(1000,220) rotate(12)">
    <rect x="0" y="0" width="130" height="185" rx="16" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <use href="#heart" transform="translate(65,80) scale(2.5)" fill="rgba(255,255,255,0.35)"/>
  </g>

  <!-- Scattered small hearts -->
  <use href="#heart" transform="translate(160,520) scale(1.2)" fill="rgba(255,255,255,0.12)"/>
  <use href="#heart" transform="translate(1080,140) scale(1.0)" fill="rgba(255,255,255,0.15)"/>
  <use href="#heart" transform="translate(820,540) scale(0.8)" fill="rgba(255,255,255,0.10)"/>
  <use href="#heart" transform="translate(350,85) scale(0.7)" fill="rgba(255,255,255,0.08)"/>

  <!-- Sparkle dots -->
  <circle cx="780" cy="100" r="3" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1100" cy="450" r="2.5" fill="rgba(255,255,255,0.18)"/>
  <circle cx="500" cy="550" r="2" fill="rgba(255,255,255,0.12)"/>

  <!-- Content card -->
  <rect x="60" y="60" width="760" height="510" rx="28" fill="rgba(0,0,0,0.18)"/>

  <!-- Main heart icon -->
  <use href="#heart" transform="translate(115,135) scale(4)" fill="white"/>

  <!-- App name -->
  <text x="100" y="235" font-family="system-ui,-apple-system,sans-serif" font-size="76" font-weight="900" fill="white" letter-spacing="-2">Bedroom</text>
  <text x="100" y="325" font-family="system-ui,-apple-system,sans-serif" font-size="76" font-weight="900" fill="white" letter-spacing="-2">Commands</text>

  <!-- Subtitle -->
  <text x="100" y="385" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.85)">750+ Couples Card Game</text>

  <!-- Category tags -->
  <rect x="100" y="415" width="130" height="38" rx="19" fill="rgba(255,255,255,0.2)"/>
  <text x="165" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">Romantic</text>

  <rect x="245" y="415" width="105" height="38" rx="19" fill="rgba(255,255,255,0.2)"/>
  <text x="297" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">Spicy</text>

  <rect x="365" y="415" width="120" height="38" rx="19" fill="rgba(255,255,255,0.2)"/>
  <text x="425" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">Playful</text>

  <rect x="500" y="415" width="140" height="38" rx="19" fill="rgba(255,255,255,0.2)"/>
  <text x="570" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">Adventures</text>

  <rect x="655" y="415" width="120" height="38" rx="19" fill="rgba(255,255,255,0.2)"/>
  <text x="715" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="600" fill="white" text-anchor="middle">Relaxing</text>

  <!-- CTA -->
  <text x="100" y="515" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.7)">Free  ·  No sign-up  ·  Play instantly</text>
</svg>
